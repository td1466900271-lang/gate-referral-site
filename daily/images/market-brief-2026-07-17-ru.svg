<text x="26" y="110" fill="#d9ecff" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Фокус на марже и свободном денежном потоке.</text>
<text x="26" y="142" fill="#d9ecff" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">GateAffiliate · код VLYQB1HXUW</text>
