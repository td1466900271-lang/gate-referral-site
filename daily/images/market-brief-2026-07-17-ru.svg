<text x="26" y="110" fill="#d9ecff" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">2. Подтвердят ли объемы SOXX / SMH?</text>
<text x="26" y="142" fill="#d9ecff" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">3. Растут ли нефть, ставки и доллар вместе?</text>
