<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">全球市場機構簡報 2026-05-22</title>
  <desc id="desc">風險資產高位震盪，半導體分化，BTC 7.7萬美元附近，資金費率接近中性。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06120f"/>
      <stop offset="0.55" stop-color="#0b1b17"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#30f2a6"/>
      <stop offset="1" stop-color="#38d9d0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; }
      .muted { fill: #a9bdb5; }
      .text { fill: #f5fff9; }
      .green { fill: #30f2a6; }
      .teal { fill: #38d9d0; }
      .amber { fill: #ffd36a; }
      .red { fill: #ff7d7d; }
      .card { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.14); stroke-width: 1.5; }
      .small { font-size: 27px; }
      .body { font-size: 34px; }
      .label { font-size: 30px; font-weight: 700; }
      .num { font-size: 48px; font-weight: 850; }
      .title { font-size: 70px; font-weight: 900; letter-spacing: 0; }
      .subtitle { font-size: 34px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1340" cy="120" r="260" fill="#30f2a6" opacity="0.08"/>
  <circle cx="1260" cy="850" r="340" fill="#38d9d0" opacity="0.06"/>
  <path d="M90 780 C280 670 410 780 560 650 S860 520 1040 610 S1300 710 1510 560" fill="none" stroke="#30f2a6" stroke-width="6" opacity="0.28"/>
  <path d="M90 820 C300 730 420 830 590 705 S880 590 1040 680 S1320 770 1510 635" fill="none" stroke="#38d9d0" stroke-width="4" opacity="0.18"/>

  <g class="font">
    <rect x="72" y="60" width="1456" height="880" rx="28" class="card" filter="url(#softShadow)"/>
    <rect x="72" y="60" width="1456" height="10" rx="5" fill="url(#accent)"/>

    <text x="112" y="128" class="muted small">2026-05-22 · 全球市場機構簡報</text>
    <text x="112" y="215" class="text title">高位震盪 + 結構行情</text>
    <text x="112" y="270" class="muted subtitle">半導體內部開始分化，BTC 槓桿情緒溫和，原油與黃金維持高位。</text>

    <g transform="translate(112 330)">
      <rect width="420" height="170" rx="18" class="card"/>
      <text x="28" y="54" class="muted label">BTC 現貨</text>
      <text x="28" y="118" class="green num">77,661</text>
      <text x="235" y="118" class="muted body">美元附近</text>
      <text x="28" y="150" class="muted small">HL funding 接近中性</text>
    </g>

    <g transform="translate(590 330)">
      <rect width="420" height="170" rx="18" class="card"/>
      <text x="28" y="54" class="muted label">半導體 ETF</text>
      <text x="28" y="118" class="green num">SMH +0.57%</text>
      <text x="28" y="150" class="muted small">SOXX +0.85%，籃子強於龍頭</text>
    </g>

    <g transform="translate(1068 330)">
      <rect width="420" height="170" rx="18" class="card"/>
      <text x="28" y="54" class="muted label">龍頭分化</text>
      <text x="28" y="118" class="red num">NVDA -1.77%</text>
      <text x="28" y="150" class="muted small">MU +4.11%，資金偏週期彈性</text>
    </g>

    <g transform="translate(112 550)">
      <rect width="658" height="270" rx="18" class="card"/>
      <text x="28" y="58" class="text label">今天最重要的 3 個問題</text>
      <text x="28" y="116" class="muted body">1. AI 景氣還能抵消估值壓力嗎？</text>
      <text x="28" y="170" class="muted body">2. NVDA 弱、MU 強，是輪動還是轉向？</text>
      <text x="28" y="224" class="muted body">3. BTC 若 funding 和溢價轉正，槓桿會追漲嗎？</text>
    </g>

    <g transform="translate(830 550)">
      <rect width="658" height="270" rx="18" class="card"/>
      <text x="28" y="58" class="text label">操作框架</text>
      <text x="28" y="116" class="muted body">短線不宜盲目追指數 beta。</text>
      <text x="28" y="170" class="muted body">優先看相對收益：SMH/SOXX vs 單一龍頭。</text>
      <text x="28" y="224" class="muted body">重點跟蹤：TSM、NVDA、MU、AMAT。</text>
    </g>

    <text x="112" y="884" class="amber small">一句話結論：市場不是全面風險偏好爆發，而是“高位震盪裡找結構機會”。</text>
    <text x="112" y="920" class="muted small">資訊僅供參考，不構成投資建議。數據來自用戶提供的當日簡報與所列公開來源。</text>
  </g>
</svg>
