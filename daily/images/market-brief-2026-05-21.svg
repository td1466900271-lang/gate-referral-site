<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">全球市場機構簡報 2026-05-21</title>
  <desc id="desc">風險資產修復式反彈，油價回落、收益率降溫，但FOMC紀要提高政策偏鷹尾部風險。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06120f"/><stop offset="0.55" stop-color="#0b1b17"/><stop offset="1" stop-color="#13231f"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffd36a"/><stop offset="1" stop-color="#30f2a6"/></linearGradient>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",Arial,sans-serif}.muted{fill:#a9bdb5}.text{fill:#f5fff9}.green{fill:#30f2a6}.amber{fill:#ffd36a}.red{fill:#ff7d7d}.card{fill:rgba(255,255,255,.055);stroke:rgba(255,255,255,.14);stroke-width:1.5}.small{font-size:27px}.body{font-size:34px}.label{font-size:30px;font-weight:700}.num{font-size:48px;font-weight:850}.title{font-size:70px;font-weight:900}.subtitle{font-size:34px;font-weight:650}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1280" cy="150" r="310" fill="#ffd36a" opacity=".08"/>
  <circle cx="1240" cy="820" r="360" fill="#30f2a6" opacity=".06"/>
  <path d="M90 750 C300 610 470 760 650 610 S950 510 1130 620 S1360 725 1510 560" fill="none" stroke="#ffd36a" stroke-width="6" opacity=".22"/>
  <path d="M90 812 C320 700 500 815 720 680 S1020 600 1190 715 S1390 790 1510 675" fill="none" stroke="#30f2a6" stroke-width="4" opacity=".18"/>
  <g class="font">
    <rect x="72" y="60" width="1456" height="880" rx="28" class="card"/>
    <rect x="72" y="60" width="1456" height="10" rx="5" fill="url(#accent)"/>
    <text x="112" y="128" class="muted small">2026-05-21 · 對應美股 2026-05-20 收盤/盤後</text>
    <text x="112" y="215" class="text title">修復式反彈，但政策尾部偏鷹</text>
    <text x="112" y="270" class="muted subtitle">油價回落與收益率降溫支撐反彈，AI估值仍受利率約束。</text>
    <g transform="translate(112 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">標普500</text><text x="28" y="118" class="green num">+1.1%</text><text x="28" y="150" class="muted small">收於 7,432.97</text></g>
    <g transform="translate(590 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">布倫特原油</text><text x="28" y="118" class="green num">-5.6%</text><text x="28" y="150" class="muted small">通脹壓力暫時降溫</text></g>
    <g transform="translate(1068 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">政策風險</text><text x="28" y="118" class="amber num">更鷹</text><text x="28" y="150" class="muted small">FOMC紀要提到進一步收緊可能</text></g>
    <g transform="translate(112 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">今天最重要的 3 個問題</text><text x="28" y="116" class="muted body">1. 油價回落能持續壓低通脹預期嗎？</text><text x="28" y="170" class="muted body">2. 美債收益率會不會重新上行？</text><text x="28" y="224" class="muted body">3. NVDA財報後是上修，還是利好兌現？</text></g>
    <g transform="translate(830 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">操作框架</text><text x="28" y="116" class="muted body">反彈來自油價與利率緩和。</text><text x="28" y="170" class="muted body">AI鏈條短線重新看估值和利率。</text><text x="28" y="224" class="muted body">重點看10Y/30Y、油價、NVDA盤後消化。</text></g>
    <text x="112" y="884" class="amber small">一句話結論：市場在修復，但不是風險解除；長端利率仍是AI估值的開關。</text>
    <text x="112" y="920" class="muted small">資訊僅供參考，不構成投資建議。數據來自用戶提供的當日簡報與所列公開來源。</text>
  </g>
</svg>
