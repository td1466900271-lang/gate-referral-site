 Market Brief</text><text x="112" y="215" class="text title">AI demand confirmed + valuation discipline</text><text x="112" y="270" class="muted subtitle">Strong NVIDIA guide; rates, oil and positioning keep the trade selective.</text><g transform="translate(112 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">NVDA Q1</text><text x="28" y="118" class="green num">Revenue $81.6B</text><text x="28" y="150" class="muted small">+85% YoY</text></g><g transform="translate(590 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">Q2 guide</text><text x="28" y="118" class="green num">$91B ±2%</text><text x="28" y="150" class="muted small">AI factories still strong</text></g><g transform="translate(1068 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">TSM watch</text><text x="28" y="118" class="amber num">$400 / $390</text><text x="28" y="150" class="muted small">No chase, control risk</text></g><g transform="translate(112 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">3 key questions</text><text x="28" y="116" class="muted body">1. Can NVDA hold $213-215?</text><text x="28" y="170" class="muted body">2. Is TSM stable near $400?</text><text x="28" y="224" class="muted body">3. Do 10Y, oil and BTC weaken together?</text></g><g transform="translate(830 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">Framework</text><text x="28" y="116" class="muted body">Hold core AI; avoid leverage.</text><text x="28" y="170" class="muted body">Below $390 TSM, reassess risk.</text><text x="28" y="224" class="muted body">Networking +199%: optical, power, cooling.</text></g><text x="112" y="884" class="amber small">Bottom line: AI fundamentals are stronger, but valuation and macro discipline matter.</text><text x="112" y="920" class="muted small">For information only, not financial advice. Based on the supplied brief and public sources.</text></g></svg>