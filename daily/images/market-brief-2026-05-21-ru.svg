<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Глобальный рыночный обзор 2026-05-21</title>
  <desc id="desc">Восстановительный отскок, нефть снизилась, доходности остыли, но FOMC minutes добавили hawkish tail risk.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06120f"/><stop offset=".55" stop-color="#0b1b17"/><stop offset="1" stop-color="#13231f"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffd36a"/><stop offset="1" stop-color="#30f2a6"/></linearGradient><style>.font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.muted{fill:#a9bdb5}.text{fill:#f5fff9}.green{fill:#30f2a6}.amber{fill:#ffd36a}.card{fill:rgba(255,255,255,.055);stroke:rgba(255,255,255,.14);stroke-width:1.5}.small{font-size:27px}.body{font-size:34px}.label{font-size:30px;font-weight:700}.num{font-size:48px;font-weight:850}.title{font-size:66px;font-weight:900}.subtitle{font-size:34px;font-weight:650}</style></defs>
  <rect width="1600" height="1000" fill="url(#bg)"/><circle cx="1280" cy="150" r="310" fill="#ffd36a" opacity=".08"/><circle cx="1240" cy="820" r="360" fill="#30f2a6" opacity=".06"/>
  <path d="M90 750 C300 610 470 760 650 610 S950 510 1130 620 S1360 725 1510 560" fill="none" stroke="#ffd36a" stroke-width="6" opacity=".22"/><path d="M90 812 C320 700 500 815 720 680 S1020 600 1190 715 S1390 790 1510 675" fill="none" stroke="#30f2a6" stroke-width="4" opacity=".18"/>
  <g class="font"><rect x="72" y="60" width="1456" height="880" rx="28" class="card"/><rect x="72" y="60" width="1456" height="10" rx="5" fill="url(#accent)"/>
    <text x="112" y="128" class="muted small">2026-05-21 · US close / after-hours</text><text x="112" y="215" class="text title">Отскок, но policy tail hawkish</text><text x="112" y="270" class="muted subtitle">Нефть и yields остыли, но AI valuations зависят от long-end rates.</text>
    <g transform="translate(112 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">S&amp;P 500</text><text x="28" y="118" class="green num">+1.1%</text><text x="28" y="150" class="muted small">Закрылся на 7,432.97</text></g>
    <g transform="translate(590 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">Brent Oil</text><text x="28" y="118" class="green num">-5.6%</text><text x="28" y="150" class="muted small">Инфляционное давление снизилось</text></g>
    <g transform="translate(1068 330)"><rect width="420" height="170" rx="18" class="card"/><text x="28" y="54" class="muted label">Policy Risk</text><text x="28" y="118" class="amber num">Hawkish</text><text x="28" y="150" class="muted small">FOMC minutes: риск tightening</text></g>
    <g transform="translate(112 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">3 вопроса дня</text><text x="28" y="116" class="muted body">1. Снижение нефти удержит inflation expectations?</text><text x="28" y="170" class="muted body">2. Treasury yields снова пойдут вверх?</text><text x="28" y="224" class="muted body">3. NVDA: upgrade или sell-the-news?</text></g>
    <g transform="translate(830 550)"><rect width="658" height="270" rx="18" class="card"/><text x="28" y="58" class="text label">Рамка</text><text x="28" y="116" class="muted body">Отскок пришел от oil/rate relief.</text><text x="28" y="170" class="muted body">AI chain снова смотрит на valuation и rates.</text><text x="28" y="224" class="muted body">Фокус: 10Y/30Y, oil, NVDA digestion.</text></g>
    <text x="112" y="884" class="amber small">Итог: рынок восстановился, но риск не ушел; long-end rates остаются ключом для AI valuations.</text><text x="112" y="920" class="muted small">Только информация, не инвестиционный совет. Данные из предоставленного обзора и публичных источников.</text>
  </g>
</svg>
