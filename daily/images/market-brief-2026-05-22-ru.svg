    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#30f2a6"/><stop offset="1" stop-color="#38d9d0"/></linearGradient>
    <style>.font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.muted{fill:#a9bdb5}.text{fill:#f5fff9}.green{fill:#30f2a6}.amber{fill:#ffd36a}.red{fill:#ff7d7d}.card{fill:rgba(255,255,255,.055);stroke:rgba(255,255,255,.14);stroke-width:1.5}.small{font-size:27px}.body{font-size:34px}.label{font-size:30px;font-weight:700}.num{font-size:48px;font-weight:850}.title{font-size:68px;font-weight:900}.subtitle{font-size:34px;font-weight:650}</style>
