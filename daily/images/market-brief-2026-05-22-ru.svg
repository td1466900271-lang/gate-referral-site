  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1340" cy="120" r="260" fill="#30f2a6" opacity=".08"/><circle cx="1260" cy="850" r="340" fill="#38d9d0" opacity=".06"/>
  <path d="M90 780 C280 670 410 780 560 650 S860 520 1040 610 S1300 710 1510 560" fill="none" stroke="#30f2a6" stroke-width="6" opacity=".28"/>
  <path d="M90 820 C300 730 420 830 590 705 S880 590 1040 680 S1320 770 1510 635" fill="none" stroke="#38d9d0" stroke-width="4" opacity=".18"/>
  <g class="font">
